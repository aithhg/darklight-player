name: darklight_player
description: DarkLight Player - A modern video player built with Flutter and media_kit
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  mobx: ^2.3.0
  flutter_mobx: ^2.2.0
  provider: ^6.1.0

  # Routing
  go_router: ^14.0.0

  # Database
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # HTTP
  dio: ^5.4.0

  # Video player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_windows_video: ^1.0.9

  # Window management
  window_manager: ^0.4.0

  # File picker
  file_picker: ^8.0.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  logger: ^2.0.0
  url_launcher: ^6.3.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  mobx_codegen: ^2.6.0
  json_serializable: ^6.8.0
  freezed_annotation: ^2.4.0
  freezed: ^2.5.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
